services:
  - type: web
    name: soundhub-api
    env: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt && playwright install chromium --with-deps"
    startCommand: "uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TIKTOK_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_USER_ID
        sync: false
      - key: YOUTUBE_CREDENTIALS_JSON
        sync: false
      - key: FRONTEND_URL
        sync: false
