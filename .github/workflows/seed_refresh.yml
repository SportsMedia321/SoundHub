name: Seed Refresh — bi-weekly

on:
  schedule:
    - cron: '0 3 */14 * *'   # every 14 days at 3 AM UTC
  workflow_dispatch:

jobs:
  seed-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r backend/requirements.txt && playwright install chromium --with-deps
      - name: Run seed refresh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MIN_SEED_ENG_THRESHOLD: '0.05'
          SEED_GRACE_CYCLES: '2'
        run: python backend/agents/seed_refresh_agent.py
